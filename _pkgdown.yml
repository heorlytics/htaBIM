url: https://heorlytics.github.io/htaBIM

template:
  bootstrap: 5
  bootswatch: flatly

home:
  title: "htaBIM — Budget Impact Modelling for HTA"
  description: >
    A structured, reproducible framework for budget impact modelling (BIM)
    in health technology assessment (HTA), following the ISPOR Task Force
    guidelines.

authors:
  Shubhram Pandey:
    href: https://Heorlytics.com
  Heorlytics Ltd:
    href: https://Heorlytics.com
    html: '<img src="https://Heorlytics.com/" height="24" alt="Heorlytics"/>'

navbar:
  structure:
    left:  [reference, articles, news]
    right: [search, github]
  components:
    articles:
      text: Articles
      menu:
        - text: Introduction
          href: articles/htaBIM-introduction.html
        - text: Interactive Shiny App
          href: articles/shiny-app.html
    github:
      icon: fa-github
      href: https://github.com/Heorlytics/htaBIM
      aria-label: GitHub

reference:
  - title: "Population estimation"
    desc: Functions to estimate the eligible patient population, visualise the funnel, and export results.
    contents:
      - bim_population
      - bim_plot_funnel
      - bim_export_population

  - title: "Market share modelling"
    desc: Functions to specify treatment market shares and uptake dynamics.
    contents:
      - bim_market_share

  - title: "Cost inputs"
    desc: Functions to build per-patient cost inputs.
    contents:
      - bim_costs
      - bim_costs_drug
      - bim_costs_ae

  - title: "Model assembly"
    desc: Assemble and run the budget impact model.
    contents:
      - bim_model

  - title: "Payer perspectives"
    desc: Define or select payer perspectives.
    contents:
      - bim_payer
      - bim_payer_default
      - bim_payer_nhs
      - bim_payer_cadth
      - bim_payer_us_commercial

  - title: "Sensitivity analysis"
    desc: Deterministic and probabilistic sensitivity analysis tools.
    contents:
      - bim_sensitivity_spec
      - bim_run_dsa
      - bim_run_psa

  - title: "Results and outputs"
    desc: Extract results, tables, plots, and reports.
    contents:
      - bim_extract
      - bim_table
      - bim_scenario_table
      - bim_cost_breakdown
      - bim_report

  - title: "Plots"
    desc: Visualisation functions.
    contents:
      - plot.bim_model
      - bim_plot_line
      - bim_plot_bar
      - bim_plot_shares
      - bim_plot_tornado
      - bim_plot_psa
      - bim_plot_cost_breakdown

  - title: "Interactive app"
    desc: Shiny dashboard.
    contents:
      - launch_shiny

  - title: "Print and summary methods"
    desc: S3 print and summary methods for htaBIM objects.
    contents:
      - print.bim_population
      - print.bim_market_share
      - print.bim_costs
      - print.bim_payer
      - print.bim_model
      - print.bim_dsa
      - summary.bim_population
      - summary.bim_model

  - title: "Data"
    desc: Built-in example datasets.
    contents:
      - bim_example

articles:
  - title: "Getting started"
    navbar: ~
    contents:
      - htaBIM-introduction
  - title: "Interactive app"
    navbar: ~
    contents:
      - shiny-app
